steps:
  # Build and push FastAPI backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 
           'gcr.io/$PROJECT_ID/news-bias-backend:$COMMIT_SHA', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 
           'gcr.io/$PROJECT_ID/news-bias-backend:$COMMIT_SHA']

  # Build and push RAG microservice image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t',
           'gcr.io/$PROJECT_ID/news-bias-rag:$COMMIT_SHA',
           '-f', 'Dockerfile.rag', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push',
           'gcr.io/$PROJECT_ID/news-bias-rag:$COMMIT_SHA']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'news-bias-backend'
      - '--image=gcr.io/$PROJECT_ID/news-bias-backend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=LLM_PROVIDER=openai'
      - '--add-cloudsql-instances=$PROJECT_ID:asia-south1:news-bias-db'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=3'

  # Deploy RAG service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'news-bias-rag'
      - '--image=gcr.io/$PROJECT_ID/news-bias-rag:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--max-instances=2'

  # Deploy React frontend to Firebase
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting']

images:
  - 'gcr.io/$PROJECT_ID/news-bias-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/news-bias-rag:$COMMIT_SHA'
